<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard SAF – Redirigiendo...</title>
    <script>
      // GitHub Pages SPA redirect workaround.
      // When GitHub Pages 404s on a client-side route, redirect to index.html
      // with the path encoded as a query param so the app can restore it.
      var segmentCount = 1; // number of path segments to keep (repo name = 1)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
