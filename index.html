<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Fiscalización Forestal SAF - CONAF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <!-- GitHub Pages SPA: restore the path from 404.html redirect -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle the ?p= param from 404.html
        var search = window.location.search;
        if (search.slice(1,3) === 'p=') {
          var decoded = '/' + search.slice(3).split('&')[0].replace(/~and~/g, '&');
          window.history.replaceState(null, null,
            decoded + (search.slice(1).indexOf('&q=') !== -1 ? ('?' + search.slice(1).split('&q=')[1].replace(/~and~/g, '&')) : '') +
            window.location.hash
          );
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
